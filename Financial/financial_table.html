<style>
    table {
        border-collapse: collapse;
    }

    table,
    th,
    td {
        border: 1px solid black;
    }

    th,
    td {
        padding: 10px;
    }
</style>

<body>
    <table>
        <caption>
            <h2>Báo cáo Quý 1 năm 2026</h2>
        </caption>
        <thead>
            <tr>
                <th rowspan="2">Khu vực</th>
                <th rowspan="2">Mảng</th>
                <th colspan="3">Doanh thu</th>
            </tr>
            <tr>
                <th>Tháng 1</th>
                <th>Tháng 2</th>
                <th>Tháng 3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">Châu Á</td>
                <td>Phần cứng</td>
                <td>500$</td>
                <td>600$</td>
                <td>550$</td>
            </tr>
            <tr>
                <td>Phần mềm</td>
                <td>1000$</td>
                <td>1200$</td>
                <td>1100$</td>
            </tr>
            <tr>
                <td>Châu Âu</td>
                <td>Phần mềm</td>
                <td>800$</td>
                <td>900$</td>
                <td>950$</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Tổng lợi nhuận toàn cầu:</td>
                <td>2300$</td>
                <td>2700$</td>
                <td>2600$</td>
            </tr>
        </tfoot>
    </table>
</body>
